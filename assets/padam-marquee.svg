<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="'DejaVu Sans','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/><stop offset="1" stop-color="#07090e"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.32" r="0.6">
      <stop offset="0" stop-color="#f5c451" stop-opacity="0.22"/><stop offset="1" stop-color="#f5c451" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe08a"/><stop offset="1" stop-color="#e0a72e"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="380" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="16" fill="url(#spot)"/>

  <!-- classic Tamil-cinema hero silhouette (stylized, regal raised-hand pose) -->
  <g fill="#05070b" opacity="0.92">
    <path d="M150 360 q5 -120 60 -150 q-30 -28 -10 -64 q18 -32 56 -28 q40 4 46 44 q4 30 -16 50 q44 16 58 70 l14 78 q-104 22 -208 0 z"/>
    <!-- turban -->
    <path d="M196 118 q40 -40 96 -8 q-8 -34 -52 -34 q-44 0 -44 42 z" fill="#0c1018"/>
    <!-- raised arm, theatrical -->
    <path d="M312 196 q70 -34 96 -104 q10 -26 30 -16 q16 8 6 30 q-30 92 -118 126 z"/>
  </g>
  <!-- rim light on the hero -->
  <path d="M150 360 q5 -120 60 -150 q-30 -28 -10 -64 q18 -32 56 -28" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.45"/>

  <!-- marquee bulbs -->
  <g fill="#ffd86b" filter="url(#glow)">
    <circle cx="470" cy="64" r="6"/><circle cx="520" cy="64" r="6"/><circle cx="570" cy="64" r="6"/><circle cx="620" cy="64" r="6"/>
    <circle cx="670" cy="64" r="6"/><circle cx="720" cy="64" r="6"/><circle cx="770" cy="64" r="6"/><circle cx="820" cy="64" r="6"/>
    <circle cx="870" cy="64" r="6"/><circle cx="920" cy="64" r="6"/><circle cx="970" cy="64" r="6"/><circle cx="1020" cy="64" r="6"/>
    <circle cx="450" cy="64" r="6"/><circle cx="1040" cy="64" r="6"/>
  </g>

  <!-- marquee board -->
  <rect x="440" y="78" width="612" height="206" rx="14" fill="#0d1117" stroke="url(#gold)" stroke-width="4"/>
  <text x="746" y="126" text-anchor="middle" fill="#f5c451" font-size="30" letter-spacing="2">படம்</text>
  <text x="746" y="206" text-anchor="middle" fill="#e6edf3" font-size="92" font-weight="800" letter-spacing="2">PADAM</text>
  <rect x="540" y="232" width="412" height="34" rx="6" fill="#1c2230"/>
  <text x="746" y="256" text-anchor="middle" fill="#3fb950" font-size="18" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" letter-spacing="3">NOW SHOWING: hello, world</text>

  <!-- film strip across the bottom, frames carry tech glyphs -->
  <g>
    <rect x="0" y="316" width="1200" height="50" fill="#0a0c12"/>
    <g fill="#1c2230">
      <rect x="14" y="322" width="14" height="9" rx="2"/><rect x="14" y="349" width="14" height="9" rx="2"/>
      <rect x="74" y="322" width="14" height="9" rx="2"/><rect x="74" y="349" width="14" height="9" rx="2"/>
      <rect x="134" y="322" width="14" height="9" rx="2"/><rect x="134" y="349" width="14" height="9" rx="2"/>
      <rect x="194" y="322" width="14" height="9" rx="2"/><rect x="194" y="349" width="14" height="9" rx="2"/>
      <rect x="254" y="322" width="14" height="9" rx="2"/><rect x="254" y="349" width="14" height="9" rx="2"/>
    </g>
    <text x="320" y="350" fill="#58a6ff" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="22">&lt;/&gt;</text>
    <text x="400" y="350" fill="#bc8cff" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="22">{ }</text>
    <text x="470" y="350" fill="#3fb950" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="22">$ _</text>
    <text x="560" y="350" fill="#f5c451" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="22">▶</text>
    <text x="620" y="350" fill="#8b949e" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="20">[mp4]</text>
    <text x="720" y="350" fill="#58a6ff" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="20">storyboard.json</text>
    <text x="940" y="350" fill="#3fb950" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="20">→ render →</text>
    <text x="1080" y="350" fill="#f5c451" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="22">🎬</text>
  </g>

  <!-- cheeky tagline -->
  <text x="1052" y="120" text-anchor="end" fill="#6e7681" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="17">prompt your agent.</text>
  <text x="1052" y="146" text-anchor="end" fill="#6e7681" font-family="'DejaVu Sans Mono','Liberation Mono',monospace" font-size="17">get a படம்.</text>
</svg>
